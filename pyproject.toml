[tool.pytest.ini_options]
addopts = "--cov=app --cov-report=term-missing --cov-fail-under=100"
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
source = ["app"]
omit = [
    "app/main.py",
    "app/infrastructure/otel_telemetry.py",
]

[tool.coverage.report]
show_missing = true
exclude_lines = ["pragma: no cover", "\\.\\.\\.", "if __name__ == .__main__.:"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
